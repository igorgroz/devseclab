name: Security Pipeline

# ──────────────────────────────────────────────────────────────────
# Trigger strategy:
#   PRs       → SAST + SCA (fast gates, fail fast before merge)
#   push main → full pipeline: SAST → SCA → build → Trivy → push →
#               Cosign sign → DAST
#   schedule  → weekly SCA re-run to catch newly published CVEs
# ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 2 * * 1'   # Weekly Monday 02:00 UTC — catches new CVEs

permissions:
  contents: read
  security-events: write
  packages: write
  id-token: write
  issues: write        # ZAP baseline action creates/updates issues with scan findings

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/dsl-frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/dsl-backend
  NODE_VERSION: '20'
  TRIVY_VERSION: 'v0.69.3'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
  CLUSTER_NAME: dsl-eks

jobs:

# ══════════════════════════════════════════════════════════════════
# JOB 1 — SAST: Semgrep
# ══════════════════════════════════════════════════════════════════
  sast:
    name: SAST (Semgrep)
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    outputs:
      has_findings: ${{ steps.evaluate.outputs.has_findings }}
      error_count:  ${{ steps.evaluate.outputs.error_count }}
      warn_count:   ${{ steps.evaluate.outputs.warn_count }}
      findings:     ${{ steps.evaluate.outputs.findings }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        # NOTE: --error removed. This codebase contains deliberately vulnerable
        # routes (insecure-users, addInsecureCloth) for the SQLi demo; p/sql-
        # injection legitimately flags them every run. Hard-failing on any
        # finding turned the pipeline permanently red. Findings now flow
        # through the sast-gate job for review-with-attestation instead.
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/react \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/sql-injection \
            --sarif \
            --output semgrep.sarif \
            .

      - name: Ensure SARIF exists
        if: always()
        run: |
          if [ ! -s semgrep.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > semgrep.sarif
          fi

      - name: Annotate findings + emit outputs
        id: evaluate
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os
          with open("semgrep.sarif") as f:
              sarif = json.load(f)
          err, warn, lines = 0, 0, []
          for run in sarif.get("runs", []):
              for result in run.get("results", []):
                  level  = result.get("level", "warning")
                  msg    = result["message"]["text"].replace("\n", " ")[:160]
                  rule   = result.get("ruleId", "unknown-rule")
                  for loc in result.get("locations", []):
                      try:
                          uri  = loc["physicalLocation"]["artifactLocation"]["uri"]
                          line = loc["physicalLocation"]["region"]["startLine"]
                          gh   = "error" if level == "error" else "warning"
                          print(f"::{gh} file={uri},line={line}::[{rule}] {msg}")
                          if level == "error": err += 1
                          else: warn += 1
                          lines.append(f"{level.upper():7s} {rule}  {uri}:{line}")
                      except (KeyError, IndexError):
                          pass
          has_findings = "true" if (err + warn) > 0 else "false"
          print(f"\nSAST result: error={err}  warn={warn}")
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"has_findings={has_findings}\n")
              f.write(f"error_count={err}\n")
              f.write(f"warn_count={warn}\n")
              f.write("findings<<__EOF__\n")
              f.write("\n".join(lines[:50]) if lines else "(none)")
              f.write("\n__EOF__\n")
          EOF

      - name: Upload SARIF → GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload SARIF artifact (for sast-gate consumption)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 30

# ══════════════════════════════════════════════════════════════════
# JOB 1b — SAST Manual Review Gate
#
# Same shape as sca-gate. If SAST flagged any finding, this enters
# the `sast-review` environment for required-reviewer approval.
# Otherwise auto-approves.
# ══════════════════════════════════════════════════════════════════
  sast-gate:
    name: SAST Manual Review Gate
    needs: sast
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    # AUTO_APPROVE_GATES: set to 'true' in GitHub Settings → Variables → Actions
    # to bypass the manual pause (useful during active dev). Remove or set to
    # anything else to reinstate required-reviewer approval on findings.
    environment: ${{ vars.AUTO_APPROVE_GATES != 'true' && needs.sast.outputs.has_findings == 'true' && 'sast-review' || '' }}
    outputs:
      decision: ${{ steps.record.outputs.decision }}
    steps:
      - name: Summarise SAST outcome for reviewer
        run: |
          ERR="${{ needs.sast.outputs.error_count }}"
          WARN="${{ needs.sast.outputs.warn_count }}"
          {
            echo "## SAST Review Summary"
            echo ""
            echo "| level | count |"
            echo "|-------|------:|"
            echo "| error   | ${ERR:-0}  |"
            echo "| warning | ${WARN:-0} |"
            echo ""
            if [ "${{ needs.sast.outputs.has_findings }}" = "true" ]; then
              echo "### Findings"
              echo '```'
              echo "${{ needs.sast.outputs.findings }}"
              echo '```'
              echo ""
              echo "_Approving here will write a 'sast: accepted' entry into the_"
              echo "_vuln-signoff/v1 cosign attestation attached to the pushed image._"
              echo "_Lab admission policy accepts it; prod admission policy refuses it._"
            else
              echo "SAST clean — auto-approving."
            fi
            echo ""
            echo "Download the **semgrep-sarif** artifact for the full SARIF."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record decision
        id: record
        run: |
          if [ "${{ needs.sast.outputs.has_findings }}" = "true" ]; then
            echo "decision=accepted" >> "$GITHUB_OUTPUT"
          else
            echo "decision=clean" >> "$GITHUB_OUTPUT"
          fi

# ══════════════════════════════════════════════════════════════════
# JOB 2a — SCA: Backend (npm audit)
#
# Findings are surfaced as job outputs + workflow annotations + an
# uploaded artifact. This job NEVER fails the pipeline on findings;
# the sca-gate job (JOB 2c) is the actual gate and requires a human
# reviewer to approve or reject before the build proceeds.
# ══════════════════════════════════════════════════════════════════
  sca-backend:
    name: SCA — Backend (npm audit)
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      has_findings: ${{ steps.audit.outputs.has_findings }}
      high_count:   ${{ steps.audit.outputs.high_count }}
      crit_count:   ${{ steps.audit.outputs.crit_count }}
      findings:     ${{ steps.audit.outputs.findings }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      - name: Audit
        working-directory: backend
        run: npm audit --audit-level=none --json > npm-audit-backend.json || true

      - name: Evaluate HIGH / CRITICAL (excluding documented exceptions)
        id: audit
        working-directory: backend
        run: |
          EXCEPTED=$(jq -r '.exceptions[].ghsa' audit-exceptions.json 2>/dev/null | tr '\n' ' ')
          echo "Excepted GHSAs: ${EXCEPTED:-none}"

          FAILURES=$(jq -r --argjson exc "$(jq '[.exceptions[].ghsa]' audit-exceptions.json 2>/dev/null || echo '[]')" '
            .vulnerabilities
            | to_entries[]
            | select(.value.severity == "high" or .value.severity == "critical")
            | select(
                .value.via
                | map(
                    select(type == "object")
                    | .url // ""
                    | split("/")
                    | last
                  )
                | any(. as $id | $exc | index($id) == null)
              )
            | "\(.value.severity | ascii_upcase)  \(.key)  fixAvailable=\(.value.fixAvailable)"
          ' npm-audit-backend.json)

          HIGH=$(jq '.metadata.vulnerabilities.high     // 0' npm-audit-backend.json)
          CRIT=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit-backend.json)
          echo "Backend — Critical: $CRIT  High: $HIGH  (after exceptions: $( [ -n "$FAILURES" ] && echo "findings present" || echo "clean" ))"

          if [ -n "$FAILURES" ]; then
            echo "::warning::Backend SCA: unexcepted HIGH/CRITICAL vulnerabilities (manual review required)"
            echo "$FAILURES"
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "Backend SCA clean (any remaining HIGH/CRITICAL are in audit-exceptions.json)"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "high_count=${HIGH}"
            echo "crit_count=${CRIT}"
            echo "findings<<__EOF__"
            echo "${FAILURES:-(none after exceptions)}"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-backend
          path: |
            backend/npm-audit-backend.json
            backend/audit-exceptions.json
          retention-days: 30

# ══════════════════════════════════════════════════════════════════
# JOB 2b — SCA: Frontend (npm audit)
#
# Same model as JOB 2a: surface findings, never hard-fail. sca-gate
# is the real gate.
# ══════════════════════════════════════════════════════════════════
  sca-frontend:
    name: SCA — Frontend (npm audit)
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      has_findings: ${{ steps.audit.outputs.has_findings }}
      high_count:   ${{ steps.audit.outputs.high_count }}
      crit_count:   ${{ steps.audit.outputs.crit_count }}
      findings:     ${{ steps.audit.outputs.findings }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Audit (production deps only)
        working-directory: frontend
        run: npm audit --audit-level=none --omit=dev --json > npm-audit-frontend.json || true

      - name: Evaluate HIGH / CRITICAL (excluding documented exceptions)
        id: audit
        working-directory: frontend
        run: |
          EXCEPTED=$(jq -r '.exceptions[].ghsa' audit-exceptions.json 2>/dev/null | tr '\n' ' ')
          echo "Excepted GHSAs: ${EXCEPTED:-none}"

          FAILURES=$(jq -r --argjson exc "$(jq '[.exceptions[].ghsa]' audit-exceptions.json 2>/dev/null || echo '[]')" '
            .vulnerabilities
            | to_entries[]
            | select(.value.severity == "high" or .value.severity == "critical")
            | select(
                .value.via
                | map(
                    select(type == "object")
                    | .url // ""
                    | split("/")
                    | last
                  )
                | any(. as $id | $exc | index($id) == null)
              )
            | "\(.value.severity | ascii_upcase)  \(.key)  fixAvailable=\(.value.fixAvailable)"
          ' npm-audit-frontend.json)

          HIGH=$(jq '.metadata.vulnerabilities.high     // 0' npm-audit-frontend.json)
          CRIT=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit-frontend.json)
          echo "Frontend — Critical: $CRIT  High: $HIGH  (after exceptions: $( [ -n "$FAILURES" ] && echo "findings present" || echo "clean" ))"

          if [ -n "$FAILURES" ]; then
            echo "::warning::Frontend SCA: unexcepted HIGH/CRITICAL vulnerabilities (manual review required)"
            echo "$FAILURES"
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "Frontend SCA clean (any remaining HIGH/CRITICAL are in audit-exceptions.json)"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "high_count=${HIGH}"
            echo "crit_count=${CRIT}"
            echo "findings<<__EOF__"
            echo "${FAILURES:-(none after exceptions)}"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-frontend
          path: |
            frontend/npm-audit-frontend.json
            frontend/audit-exceptions.json
          retention-days: 30

# ══════════════════════════════════════════════════════════════════
# JOB 2c — SCA Manual Review Gate
#
# Always runs after both SCA jobs. If neither flagged findings, the
# gate auto-approves (no environment pause). If either flagged
# findings, the gate enters the `sca-review` environment which pauses
# for required reviewers to approve / reject after inspecting the
# uploaded npm-audit-* artifacts.
#
# Setup: GitHub repo → Settings → Environments → sca-review
#        → Required reviewers → add yourself
# ══════════════════════════════════════════════════════════════════
  sca-gate:
    name: SCA Manual Review Gate
    needs: [sca-backend, sca-frontend]
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: ${{ vars.AUTO_APPROVE_GATES != 'true' && (needs.sca-backend.outputs.has_findings == 'true' || needs.sca-frontend.outputs.has_findings == 'true') && 'sca-review' || '' }}
    outputs:
      decision: ${{ steps.record.outputs.decision }}
    steps:
      - name: Summarise SCA outcome for reviewer
        run: |
          BE_FIND="${{ needs.sca-backend.outputs.has_findings }}"
          FE_FIND="${{ needs.sca-frontend.outputs.has_findings }}"
          BE_HIGH="${{ needs.sca-backend.outputs.high_count }}"
          BE_CRIT="${{ needs.sca-backend.outputs.crit_count }}"
          FE_HIGH="${{ needs.sca-frontend.outputs.high_count }}"
          FE_CRIT="${{ needs.sca-frontend.outputs.crit_count }}"

          {
            echo "## SCA Review Summary"
            echo ""
            echo "| Component | Critical | High | Unexcepted findings? |"
            echo "|-----------|---------:|-----:|----------------------|"
            echo "| Backend   | ${BE_CRIT:-0} | ${BE_HIGH:-0} | ${BE_FIND:-unknown} |"
            echo "| Frontend  | ${FE_CRIT:-0} | ${FE_HIGH:-0} | ${FE_FIND:-unknown} |"
            echo ""
            if [ "$BE_FIND" = "true" ]; then
              echo "### Backend findings"
              echo '```'
              echo "${{ needs.sca-backend.outputs.findings }}"
              echo '```'
            fi
            if [ "$FE_FIND" = "true" ]; then
              echo "### Frontend findings"
              echo '```'
              echo "${{ needs.sca-frontend.outputs.findings }}"
              echo '```'
            fi
            echo ""
            echo "Download the **npm-audit-backend** / **npm-audit-frontend** artifacts from this run for full detail."
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$BE_FIND" = "true" ] || [ "$FE_FIND" = "true" ]; then
            echo "::warning::SCA findings present — manual approval required via the sca-review environment."
          else
            echo "SCA clean — auto-approving."
          fi

      - name: Record decision
        id: record
        run: |
          if [ "${{ needs.sca-backend.outputs.has_findings }}" = "true" ] || \
             [ "${{ needs.sca-frontend.outputs.has_findings }}" = "true" ]; then
            echo "decision=accepted" >> "$GITHUB_OUTPUT"
          else
            echo "decision=clean" >> "$GITHUB_OUTPUT"
          fi

# ══════════════════════════════════════════════════════════════════
# JOB 3 — Build Docker images
# ══════════════════════════════════════════════════════════════════
  build:
    name: Build Docker Images
    if: github.event_name == 'push'
    needs: [sast-gate, sca-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend-v2
          cache-to: type=gha,scope=frontend-v2,mode=max
          build-args: |
            BUILDDATE=${{ github.run_id }}

      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend-v2
          cache-to: type=gha,scope=backend-v2,mode=max
          build-args: |
            BUILDDATE=${{ github.run_id }}

# ══════════════════════════════════════════════════════════════════
# JOB 4 — Container scan: Trivy
# Diagnostic mode:
# - human-readable table output
# - no SARIF upload for now
# - fail gate still active
# ══════════════════════════════════════════════════════════════════
  container-scan:
    name: Container Scan (Trivy)
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    outputs:
      has_findings: ${{ steps.evaluate.outputs.has_findings }}
      crit_count:   ${{ steps.evaluate.outputs.crit_count }}
      high_count:   ${{ steps.evaluate.outputs.high_count }}
      findings:     ${{ steps.evaluate.outputs.findings }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rebuild frontend (from cache)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend-v2
          build-args: |
            BUILDDATE=${{ github.run_id }}

      - name: Rebuild backend (from cache)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend-v2
          build-args: |
            BUILDDATE=${{ github.run_id }}

      # Trivy now runs in JSON mode for parsing + table mode for the log.
      # exit-code: 0 — no hard fail. The trivy-gate job (JOB 4b) is the
      # decision point, mirroring SCA's manual-review pattern.

      - name: Trivy — frontend (table, log)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: table
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Trivy — backend (table, log)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: table
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Trivy — frontend (JSON, for parsing)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: json
          output: trivy-frontend.json
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Trivy — backend (JSON, for parsing)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: json
          output: trivy-backend.json
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Evaluate Trivy findings (minus exceptions)
        id: evaluate
        if: always()
        run: |
          # Build a regex of excepted CVE IDs from trivy-exceptions.json. The
          # exceptions file accepts either `cve` or `id` as the field name —
          # keep it forgiving since the SCA exceptions use different keys.
          EXC=$(jq -r '[.exceptions[] | (.cve // .id) // empty] | join("|")' trivy-exceptions.json 2>/dev/null || echo "")
          echo "Excepted CVE pattern: ${EXC:-(none)}"

          # Single jq pass per image: filter to HIGH/CRITICAL minus exceptions,
          # emit one line per finding. Count derived from line count.
          extract () {
            local file="$1" label="$2"
            [ -s "$file" ] || { echo ""; return; }
            jq -r --arg exc "$EXC" --arg label "$label" '
              [ .Results[]?.Vulnerabilities[]?
                | select(
                    (.Severity == "HIGH" or .Severity == "CRITICAL") and
                    ($exc == "" or (.VulnerabilityID | test("^(" + $exc + ")$") | not))
                  )
              ]
              | .[:20]
              | map("\($label)  \(.Severity)  \(.VulnerabilityID)  \(.PkgName)@\(.InstalledVersion) → \(.FixedVersion // "no-fix")")
              | join("\n")
            ' "$file"
          }

          FE_LINES=$(extract trivy-frontend.json FRONTEND)
          BE_LINES=$(extract trivy-backend.json  BACKEND)

          count () {
            local file="$1" sev="$2"
            [ -s "$file" ] || { echo 0; return; }
            jq -r --arg exc "$EXC" --arg sev "$sev" '
              [ .Results[]?.Vulnerabilities[]?
                | select(.Severity == $sev and
                    ($exc == "" or (.VulnerabilityID | test("^(" + $exc + ")$") | not)))
              ] | length
            ' "$file"
          }

          FE_CRIT=$(count trivy-frontend.json CRITICAL)
          FE_HIGH=$(count trivy-frontend.json HIGH)
          BE_CRIT=$(count trivy-backend.json  CRITICAL)
          BE_HIGH=$(count trivy-backend.json  HIGH)

          TOTAL=$((FE_CRIT + FE_HIGH + BE_CRIT + BE_HIGH))
          echo "Trivy unexcepted findings — FE: $FE_CRIT crit / $FE_HIGH high   BE: $BE_CRIT crit / $BE_HIGH high"

          {
            echo "has_findings=$([ $TOTAL -gt 0 ] && echo true || echo false)"
            echo "crit_count=$((FE_CRIT + BE_CRIT))"
            echo "high_count=$((FE_HIGH + BE_HIGH))"
            echo "findings<<__EOF__"
            printf '%s\n' "$FE_LINES" "$BE_LINES" | sed '/^$/d'
            [ -z "$FE_LINES" ] && [ -z "$BE_LINES" ] && echo "(none after exceptions)"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Trivy artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: |
            trivy-frontend.json
            trivy-backend.json
            trivy-exceptions.json
          retention-days: 30

# ══════════════════════════════════════════════════════════════════
# JOB 4b — Trivy Manual Review Gate
#
# Same pattern as sca-gate / sast-gate. Trivy findings on either
# image (after subtracting exceptions in trivy-exceptions.json) put
# the gate into the `trivy-review` environment. Clean = auto-approve.
# ══════════════════════════════════════════════════════════════════
  trivy-gate:
    name: Trivy Manual Review Gate
    needs: container-scan
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: ${{ vars.AUTO_APPROVE_GATES != 'true' && needs.container-scan.outputs.has_findings == 'true' && 'trivy-review' || '' }}
    outputs:
      decision: ${{ steps.record.outputs.decision }}
    steps:
      - name: Summarise Trivy outcome
        run: |
          CRIT="${{ needs.container-scan.outputs.crit_count }}"
          HIGH="${{ needs.container-scan.outputs.high_count }}"
          {
            echo "## Trivy Review Summary"
            echo ""
            echo "| Critical | High | Unexcepted findings? |"
            echo "|---------:|-----:|----------------------|"
            echo "| ${CRIT:-0} | ${HIGH:-0} | ${{ needs.container-scan.outputs.has_findings }} |"
            echo ""
            if [ "${{ needs.container-scan.outputs.has_findings }}" = "true" ]; then
              echo "### Findings (unexcepted, top 20)"
              echo '```'
              echo "${{ needs.container-scan.outputs.findings }}"
              echo '```'
              echo ""
              echo "Add CVE IDs to **trivy-exceptions.json** to suppress known-accepted issues."
              echo "Approving here writes 'trivy: accepted' into the vuln-signoff attestation."
            else
              echo "Trivy clean — auto-approving."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record decision
        id: record
        run: |
          if [ "${{ needs.container-scan.outputs.has_findings }}" = "true" ]; then
            echo "decision=accepted" >> "$GITHUB_OUTPUT"
          else
            echo "decision=clean" >> "$GITHUB_OUTPUT"
          fi

# ══════════════════════════════════════════════════════════════════
# JOB 5 — Push & Sign (Cosign keyless)
# ══════════════════════════════════════════════════════════════════
  push-and-sign:
    name: Push & Sign (Cosign keyless)
    needs: trivy-gate
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    outputs:
      frontend-digest: ${{ steps.push-frontend.outputs.digest }}
      backend-digest:  ${{ steps.push-backend.outputs.digest }}
      ecr-registry:    ${{ steps.ecr-login.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push frontend
        id: push-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend-v2
          build-args: |
            BUILDDATE=${{ github.run_id }}

      - name: Push backend
        id: push-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend-v2
          build-args: |
            BUILDDATE=${{ github.run_id }}

      - name: Sign frontend image
        run: |
          cosign sign --yes \
            ${{ env.FRONTEND_IMAGE }}@${{ steps.push-frontend.outputs.digest }}

      - name: Sign backend image
        run: |
          cosign sign --yes \
            ${{ env.BACKEND_IMAGE }}@${{ steps.push-backend.outputs.digest }}

      - name: Verify signatures
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.FRONTEND_IMAGE }}@${{ steps.push-frontend.outputs.digest }}

          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.BACKEND_IMAGE }}@${{ steps.push-backend.outputs.digest }}

      - name: Mirror frontend to ECR
        # Pull the exact digest we just signed so the ECR tag carries
        # the same content-addressed manifest. Digest equality means
        # cosign's Rekor entry is valid regardless of which registry
        # the image is later pulled from.
        # Note: ECR repos are IMMUTABLE — skip push if tag already exists.
        run: |
          ECR="${{ steps.ecr-login.outputs.registry }}"
          if aws ecr describe-images \
               --repository-name dsl-frontend \
               --image-ids imageTag=${{ github.sha }} \
               --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "dsl-frontend:${{ github.sha }} already in ECR — skipping push"
          else
            docker pull ${{ env.FRONTEND_IMAGE }}@${{ steps.push-frontend.outputs.digest }}
            docker tag  ${{ env.FRONTEND_IMAGE }}@${{ steps.push-frontend.outputs.digest }} \
                        "${ECR}/dsl-frontend:${{ github.sha }}"
            docker push "${ECR}/dsl-frontend:${{ github.sha }}"
          fi

      - name: Mirror backend to ECR
        run: |
          ECR="${{ steps.ecr-login.outputs.registry }}"
          if aws ecr describe-images \
               --repository-name dsl-backend \
               --image-ids imageTag=${{ github.sha }} \
               --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "dsl-backend:${{ github.sha }} already in ECR — skipping push"
          else
            docker pull ${{ env.BACKEND_IMAGE }}@${{ steps.push-backend.outputs.digest }}
            docker tag  ${{ env.BACKEND_IMAGE }}@${{ steps.push-backend.outputs.digest }} \
                        "${ECR}/dsl-backend:${{ github.sha }}"
            docker push "${ECR}/dsl-backend:${{ github.sha }}"
          fi

      - name: Sign backend image in ECR
        # The mirror step copies image layers only — not the cosign .sig OCI
        # artifact. Sign the ECR image directly so Kyverno can verify it when
        # admitting pods that reference the ECR URI.
        #
        # IMPORTANT: we must sign using the ECR digest, NOT the GHCR digest
        # from steps.push-backend.outputs.digest. Docker re-serialises the
        # manifest JSON when pushing to ECR (field ordering, whitespace), which
        # changes the SHA-256 and produces a different digest even though the
        # image layers are identical. If we sign with the GHCR digest, cosign
        # stores the .sig in ECR tagged sha256-<ghcr-digest>.sig — but Kyverno
        # resolves the ECR image to its ECR digest and looks for
        # sha256-<ecr-digest>.sig, finding nothing and failing verification.
        run: |
          ECR="${{ steps.ecr-login.outputs.registry }}"
          ECR_DIGEST=$(aws ecr describe-images \
            --repository-name dsl-backend \
            --image-ids imageTag=${{ github.sha }} \
            --region "${AWS_REGION}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          echo "ECR backend digest: ${ECR_DIGEST}"
          cosign sign --yes "${ECR}/dsl-backend@${ECR_DIGEST}"

      - name: Sign frontend image in ECR
        run: |
          ECR="${{ steps.ecr-login.outputs.registry }}"
          ECR_DIGEST=$(aws ecr describe-images \
            --repository-name dsl-frontend \
            --image-ids imageTag=${{ github.sha }} \
            --region "${AWS_REGION}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          echo "ECR frontend digest: ${ECR_DIGEST}"
          cosign sign --yes "${ECR}/dsl-frontend@${ECR_DIGEST}"

# ══════════════════════════════════════════════════════════════════
# JOB 6 — DAST: OWASP ZAP
# ══════════════════════════════════════════════════════════════════
  dast:
    name: DAST (OWASP ZAP)
    needs: push-and-sign
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      zap_outcome: ${{ steps.zap_api.outputs.outcome }}
      zap_report_exists: ${{ steps.collect_zap_evidence.outputs.zap_report_exists }}
      zap_scan_status: ${{ steps.collect_zap_evidence.outputs.zap_scan_status }}
      zap_fail_alerts_present: ${{ steps.collect_zap_evidence.outputs.zap_fail_alerts_present }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start application stack (DAST mode)
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.dast.yml \
            up -d --wait --wait-timeout 60
        env:
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          POSTGRES_PASSWORD: ${{ secrets.DAST_DB_PASSWORD }}
          DAST_JWT_SECRET: ${{ secrets.DAST_JWT_SECRET }}

      - name: Health-check backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5001/health; then
              echo "Backend ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend did not become healthy in time"
          exit 1

      - name: Exercise documented REST routes before ZAP
        if: always()
        run: |
          mkdir -p artifacts/zap-api

          DAST_TOKEN="$(
            docker exec dsl-backend node -e '
              const jwt = require("jsonwebtoken");
              process.stdout.write(
                jwt.sign(
                  { sub: "dast-smoke", scp: "user.read user.write" },
                  process.env.DAST_JWT_SECRET,
                  { algorithm: "HS256", expiresIn: "1h" }
                )
              );
            '
          )"

          hit() {
            local label="$1"
            shift
            {
              echo "===== ${label} ====="
              echo "Command: curl $*"
              curl -sS -i "$@"
              echo
              echo
            } >> artifacts/zap-api/route-smoke.txt
          }

          hit "GET /health" \
            http://localhost:5001/health

          hit "GET /api/insecure-users" \
            http://localhost:5001/api/insecure-users

          hit "GET /api/insecure-users/{userid}" \
            http://localhost:5001/api/insecure-users/1

          hit "GET /api/insecure-users/{userid}/clothes" \
            http://localhost:5001/api/insecure-users/1/clothes

          hit "POST /api/insecure-users/remove-cloth" \
            -H "Content-Type: application/json" \
            -d '{"userid":"1","clothid":"2"}' \
            http://localhost:5001/api/insecure-users/remove-cloth

          hit "POST /api/insecure-users/clothes" \
            -H "Content-Type: application/json" \
            -d '{"userid":"1","clothid":"2"}' \
            http://localhost:5001/api/insecure-users/clothes

          hit "GET /api/safe-users" \
            -H "Authorization: Bearer ${DAST_TOKEN}" \
            http://localhost:5001/api/safe-users

          hit "GET /api/safe-users/{userid}" \
            -H "Authorization: Bearer ${DAST_TOKEN}" \
            http://localhost:5001/api/safe-users/1

          hit "GET /api/safe-users/{userid}/clothes" \
            -H "Authorization: Bearer ${DAST_TOKEN}" \
            http://localhost:5001/api/safe-users/1/clothes

          hit "POST /api/safe-users/remove-cloth" \
            -H "Authorization: Bearer ${DAST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"userid":1,"clothid":2}' \
            http://localhost:5001/api/safe-users/remove-cloth

          hit "POST /api/safe-users/clothes" \
            -H "Authorization: Bearer ${DAST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"userid":1,"clothid":2}' \
            http://localhost:5001/api/safe-users/clothes

          # Export token for potential re-use in future authenticated scan steps.
          # ZAP API scan now targets only the insecure routes (no auth required),
          # so it no longer needs this token directly.
          echo "DAST_BEARER_TOKEN=${DAST_TOKEN}" >> "$GITHUB_ENV"

      - name: Make workspace writable for ZAP container
        run: chmod a+w ${{ github.workspace }}

      - name: Generate filtered OpenAPI spec (insecure routes only)
        # The safe routes require Entra ID Bearer tokens that ZAP cannot obtain.
        # Including them causes ZAP to flood the endpoints with 401s, overflow
        # its internal error counter, and throw an uncaught exception (exit code 3)
        # before the JSON report is written.
        #
        # Solution: strip /api/safe-users/* from the spec and write the result
        # to the workspace. The ZAP Docker action mounts $GITHUB_WORKSPACE at
        # /zap/wrk/, so ZAP reads the spec as a local file (import_file API)
        # rather than fetching it via HTTP. This is important: if we serve the
        # spec via an HTTP server, ZAP adds that server's host to its scan scope
        # and crawls it in addition to the real app — using a file path avoids
        # that entirely and keeps the scan scope to localhost:5001 only.
        run: |
          curl -sf http://localhost:5001/api-docs.json \
            | jq '
                .paths |= with_entries(
                  select(.key | startswith("/api/insecure-users"))
                )
              ' > openapi-insecure.json

          echo "Filtered spec paths (these are the only routes ZAP will scan):"
          jq -r '.paths | keys[]' openapi-insecure.json
          echo "Target server from spec:"
          jq -r '.servers[].url' openapi-insecure.json

      - name: ZAP — Baseline scan (passive + spider)
        # fail_action: false — passive scan findings are informational.
        # WARN-NEW alerts (missing headers, cache hints) are reported and
        # uploaded as an artifact; they do NOT gate the pipeline.
        # Active exploitables (SQLi, XSS) are caught by the API scan below.
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:5001'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false
          artifact_name: zap-baseline-report

      - name: ZAP — API scan (active, against OpenAPI spec)
        # Runs ZAP via docker run instead of the zaproxy/action-api-scan action.
        #
        # Why docker run directly:
        #   The action-api-scan@v0.9.0 action offers no way to set JAVA_OPTS,
        #   and the step log gets truncated before the exception traceback is
        #   visible. With 20+ alerts and hundreds of stored request/response
        #   pairs in ZAP's in-memory DB, the JVM hits its default heap ceiling
        #   during post-scan report generation / zap.core.alerts() REST call,
        #   causing an OOM or timeout → unhandled exception → exit code 3.
        #
        # Fix: -e JAVA_OPTS="-Xmx2g" gives ZAP 2 GB heap on the 7 GB runner.
        # -I flag: ignore FAIL-alert exit-code logic; our gate reads the HTML
        #   report directly for pluginid 40018/40022 (HTML fallback).
        # 2>&1 | tee: captures the full Python + JVM output to an artifact so
        #   any residual exception is visible without log-truncation issues.
        # exit 0: always succeed this step; dast-gate is the actual gate.
        id: zap_api
        run: |
          set +e
          mkdir -p artifacts/zap-api
          docker run --rm \
            --network=host \
            --user root \
            -v "${{ github.workspace }}:/zap/wrk/:rw" \
            -e JAVA_OPTS="-Xmx2g -Xms512m" \
            ghcr.io/zaproxy/zaproxy:stable \
            python zap-api-scan.py \
              -t /zap/wrk/openapi-insecure.json \
              -f openapi \
              -c /zap/wrk/.zap/rules.tsv \
              -J report_json.json \
              -w report_md.md \
              -r report_html.html \
              -I \
            2>&1 | tee artifacts/zap-api/zap-stdout.txt
          ZAP_EXIT=${PIPESTATUS[0]}
          echo "ZAP docker exit code: ${ZAP_EXIT}"
          # Propagate meaningful exit codes as a step output for gate logic,
          # but always exit 0 so subsequent steps (artifact upload, tear-down)
          # are never skipped.
          echo "outcome=$([ $ZAP_EXIT -eq 0 ] && echo success || echo failure)" >> "$GITHUB_OUTPUT"
          exit 0
        continue-on-error: true

      - name: Collect ZAP API evidence
        id: collect_zap_evidence
        if: always()
        run: |
          mkdir -p artifacts/zap-api

          # Preserve whatever the ZAP action managed to produce before succeeding
          # or failing. The scan scripts commonly emit these filenames.
          shopt -s nullglob
          report_files=(
            report_html.html
            report_json.json
            report_md.md
            zap-report.html
            zap-report.json
            zap-report.md
          )

          report_found=false
          fail_alerts_present=false
          for file in "${report_files[@]}"; do
            if [ -f "$file" ]; then
              cp "$file" artifacts/zap-api/
              report_found=true
            fi
          done

          # Primary check: JSON report (written by API scan at end of run).
          if [ -f report_json.json ]; then
            if jq -e '
              [
                .site[]?.alerts[]?.pluginid
              ]
              | any(
                  . == "40012" or
                  . == "40014" or
                  . == "40016" or
                  . == "40017" or
                  . == "40018" or
                  . == "40019" or
                  . == "40020" or
                  . == "40021" or
                  . == "40022" or
                  . == "40024"
                )
            ' report_json.json >/dev/null; then
              fail_alerts_present=true
            fi
          fi

          # Fallback check: HTML report (written incrementally; contains active
          # scan findings even when the JSON is only a baseline-phase snapshot).
          # ZAP embeds pluginid values as plain text inside the HTML body.
          if [ "$fail_alerts_present" = "false" ] && [ -f report_html.html ]; then
            for pid in 40012 40014 40016 40017 40018 40019 40020 40021 40022 40024; do
              if grep -q "pluginid.*${pid}\|${pid}.*pluginid\|\"${pid}\"" report_html.html; then
                fail_alerts_present=true
                echo "::warning::SQLi/XSS pluginid ${pid} found in HTML report (not in JSON — active scan timing issue)"
                break
              fi
            done
          fi

          curl -sS -D artifacts/zap-api/api-docs.headers \
            http://localhost:5001/api-docs.json \
            -o artifacts/zap-api/api-docs.json || true

          docker compose -f docker-compose.yml -f docker-compose.dast.yml ps \
            > artifacts/zap-api/docker-compose-ps.txt || true

          docker compose -f docker-compose.yml -f docker-compose.dast.yml logs backend \
            > artifacts/zap-api/backend.log 2>&1 || true

          docker compose -f docker-compose.yml -f docker-compose.dast.yml logs frontend \
            > artifacts/zap-api/frontend.log 2>&1 || true

          docker compose -f docker-compose.yml -f docker-compose.dast.yml logs db \
            > artifacts/zap-api/db.log 2>&1 || true

          if [ "$fail_alerts_present" = "true" ]; then
            scan_status=findings
          elif [ "${{ steps.zap_api.outputs.outcome }}" = "success" ]; then
            scan_status=clean
          elif [ "$report_found" = "true" ]; then
            scan_status=report-no-fail-alerts
          else
            scan_status=scan-error
          fi

          echo "zap_report_exists=$report_found" >> "$GITHUB_OUTPUT"
          echo "zap_scan_status=$scan_status" >> "$GITHUB_OUTPUT"
          echo "zap_fail_alerts_present=$fail_alerts_present" >> "$GITHUB_OUTPUT"

      - name: Upload ZAP API evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-api-evidence
          path: artifacts/zap-api
          if-no-files-found: warn
          retention-days: 30

      - name: Summarise ZAP findings for reviewer
        # Annotates the job log with the ZAP outcome so the reviewer has
        # context before approving or rejecting in the dast-gate job below.
        # Does NOT fail the pipeline here — the manual gate job does that.
        if: always()
        run: |
          if [ "${{ steps.collect_zap_evidence.outputs.zap_scan_status }}" = "findings" ]; then
            echo "::warning::ZAP API scan found FAIL-level alerts (SQL injection / XSS). Review the zap-api-evidence artifact before approving."
          elif [ "${{ steps.collect_zap_evidence.outputs.zap_scan_status }}" = "report-no-fail-alerts" ]; then
            echo "::warning::ZAP API scan exited non-zero, but the uploaded report does not contain SQL injection or XSS alerts. Review the zap-api-evidence artifact before approving."
          elif [ "${{ steps.collect_zap_evidence.outputs.zap_scan_status }}" = "scan-error" ]; then
            echo "::warning::ZAP API scan failed before it could publish a full report. Review the zap-api-evidence artifact for diagnostics before approving."
          else
            echo "ZAP API scan passed — no FAIL-level alerts detected"
          fi

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.dast.yml down -v
        env:
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          POSTGRES_PASSWORD: ${{ secrets.DAST_DB_PASSWORD }}
          DAST_JWT_SECRET: ${{ secrets.DAST_JWT_SECRET }}

# ══════════════════════════════════════════════════════════════════
# JOB 7 — DAST Manual Review Gate
# ══════════════════════════════════════════════════════════════════
  dast-gate:
    name: DAST Manual Review Gate
    needs: dast
    # Only run if DAST itself actually executed. Previously `if: always()`
    # meant the gate ran even when DAST was skipped (e.g. SAST failed and
    # cascaded), then auto-passed on empty outputs — that was the
    # "approved" green tick on yesterday's failed run despite DAST never
    # having scanned anything. The explicit success check makes the gate
    # honest: no DAST run → no DAST approval.
    if: needs.dast.result == 'success' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    # `findings` status puts us into the `dast-review` env for manual
    # approval; clean DAST scans auto-pass with no env attached.
    environment: ${{ vars.AUTO_APPROVE_GATES != 'true' && needs.dast.outputs.zap_fail_alerts_present == 'true' && 'dast-review' || '' }}
    outputs:
      decision: ${{ steps.record.outputs.decision }}
    steps:
      - name: Report ZAP outcome to reviewer
        run: |
          ZAP_OUTCOME="${{ needs.dast.outputs.zap_outcome }}"
          ZAP_SCAN_STATUS="${{ needs.dast.outputs.zap_scan_status }}"
          ZAP_FAIL_ALERTS_PRESENT="${{ needs.dast.outputs.zap_fail_alerts_present }}"

          {
            echo "## DAST Review Summary"
            echo ""
            echo "| ZAP outcome | scan status | FAIL alerts present |"
            echo "|-------------|-------------|---------------------|"
            echo "| ${ZAP_OUTCOME:-?} | ${ZAP_SCAN_STATUS:-?} | ${ZAP_FAIL_ALERTS_PRESENT:-?} |"
            echo ""
            case "$ZAP_SCAN_STATUS" in
              findings)
                echo "ZAP flagged FAIL-level alerts (SQLi/XSS). Approving here writes 'dast: accepted' into the vuln-signoff attestation."
                ;;
              report-no-fail-alerts)
                echo "ZAP exited non-zero but the report has no SQLi/XSS alerts. Review zap-api-evidence before approving."
                ;;
              scan-error)
                echo "ZAP failed before producing a full report. Diagnostics in zap-api-evidence."
                ;;
              clean)
                echo "ZAP clean — auto-approving."
                ;;
              *)
                echo "ZAP completed with unexpected status. Review evidence."
                ;;
            esac
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record decision
        id: record
        run: |
          if [ "${{ needs.dast.outputs.zap_fail_alerts_present }}" = "true" ]; then
            echo "decision=accepted" >> "$GITHUB_OUTPUT"
          else
            echo "decision=clean" >> "$GITHUB_OUTPUT"
          fi

# ══════════════════════════════════════════════════════════════════
# JOB 8 — Vuln-signoff Attestation
#
# Aggregates the four gate decisions (sast, sca, trivy, dast) into a
# single cosign attestation attached to each image digest. Predicate
# type: https://oznetsecure.com.au/attestations/vuln-signoff/v1
# Schema lives at .github/attestations/vuln-signoff.schema.json.
#
# Why this job sits at the end: dast-gate runs after push-and-sign,
# so the DAST decision isn't knowable when the cosign *signature* is
# written. We accept a brief window between sign and attest where the
# image is signed-but-not-yet-attested; admission policy can require
# both (signature AND attestation predicate) to admit, which gates
# any in-flight pull during that window.
# ══════════════════════════════════════════════════════════════════
  attest:
    name: Write vuln-signoff attestation
    # All upstream jobs whose outputs are read directly must be in needs[].
    # `always()` so we still emit an attestation if dast was skipped or
    # auto-passed; the predicate captures that as gates.dast.status="skipped".
    needs:
      - sast
      - sast-gate
      - sca-backend
      - sca-frontend
      - sca-gate
      - container-scan
      - trivy-gate
      - push-and-sign
      - dast
      - dast-gate
    if: always() && needs.push-and-sign.result == 'success' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build vuln-signoff predicate
        env:
          SAST_DECISION:  ${{ needs.sast-gate.outputs.decision }}
          SAST_ERR:       ${{ needs.sast.outputs.error_count }}
          SAST_WARN:      ${{ needs.sast.outputs.warn_count }}
          SCA_DECISION:   ${{ needs.sca-gate.outputs.decision }}
          SCA_BE_CRIT:    ${{ needs.sca-backend.outputs.crit_count }}
          SCA_BE_HIGH:    ${{ needs.sca-backend.outputs.high_count }}
          SCA_FE_CRIT:    ${{ needs.sca-frontend.outputs.crit_count }}
          SCA_FE_HIGH:    ${{ needs.sca-frontend.outputs.high_count }}
          TRIVY_DECISION: ${{ needs.trivy-gate.outputs.decision }}
          TRIVY_CRIT:     ${{ needs.container-scan.outputs.crit_count }}
          TRIVY_HIGH:     ${{ needs.container-scan.outputs.high_count }}
          DAST_RESULT:    ${{ needs.dast.result }}
          DAST_DECISION:  ${{ needs.dast-gate.outputs.decision }}
          DAST_STATUS:    ${{ needs.dast.outputs.zap_scan_status }}
        run: |
          python3 - <<'PY'
          import json, os, datetime

          def n(v, default=0):
              try: return int(v)
              except: return default

          def gate(decision, **findings):
              # decision may be empty when a gate was skipped — treat as skipped
              if not decision:
                  return {"status": "skipped", "findings": findings,
                          "reason": "training-lab — gate not run on this trigger"}
              return {"status": decision, "findings": findings,
                      "reason": "training-lab — intentional vulnerabilities accepted for SQLi demo"} \
                  if decision == "accepted" else \
                  {"status": decision, "findings": findings}

          predicate = {
              "pipeline_run": {
                  "workflow":   ".github/workflows/security-pipeline.yml",
                  "run_id":     os.environ["GITHUB_RUN_ID"],
                  "commit_sha": os.environ["GITHUB_SHA"],
              },
              "reviewer":    os.environ.get("GITHUB_ACTOR", "auto"),
              "approved_at": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "gates": {
                  "sast":  gate(os.environ["SAST_DECISION"],
                                error=n(os.environ["SAST_ERR"]),
                                warning=n(os.environ["SAST_WARN"])),
                  "sca":   gate(os.environ["SCA_DECISION"],
                                critical=n(os.environ["SCA_BE_CRIT"]) + n(os.environ["SCA_FE_CRIT"]),
                                high=n(os.environ["SCA_BE_HIGH"]) + n(os.environ["SCA_FE_HIGH"])),
                  "trivy": gate(os.environ["TRIVY_DECISION"],
                                critical=n(os.environ["TRIVY_CRIT"]),
                                high=n(os.environ["TRIVY_HIGH"])),
                  "dast":  gate(os.environ["DAST_DECISION"],
                                summary=os.environ.get("DAST_STATUS", "")),
              },
          }
          with open("predicate.json", "w") as f:
              json.dump(predicate, f, indent=2)
          print(json.dumps(predicate, indent=2))
          PY

      - name: Upload predicate as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vuln-signoff-predicate
          path: predicate.json
          retention-days: 90

      - name: Attest frontend image
        env:
          PREDICATE_TYPE: https://oznetsecure.com.au/attestations/vuln-signoff/v1
        run: |
          cosign attest --yes \
            --type "${PREDICATE_TYPE}" \
            --predicate predicate.json \
            ${{ env.FRONTEND_IMAGE }}@${{ needs.push-and-sign.outputs.frontend-digest }}

      - name: Attest backend image
        env:
          PREDICATE_TYPE: https://oznetsecure.com.au/attestations/vuln-signoff/v1
        run: |
          cosign attest --yes \
            --type "${PREDICATE_TYPE}" \
            --predicate predicate.json \
            ${{ env.BACKEND_IMAGE }}@${{ needs.push-and-sign.outputs.backend-digest }}

      - name: Verify attestations
        env:
          PREDICATE_TYPE: https://oznetsecure.com.au/attestations/vuln-signoff/v1
        run: |
          cosign verify-attestation \
            --type "${PREDICATE_TYPE}" \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.FRONTEND_IMAGE }}@${{ needs.push-and-sign.outputs.frontend-digest }} \
            > /dev/null

          cosign verify-attestation \
            --type "${PREDICATE_TYPE}" \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.BACKEND_IMAGE }}@${{ needs.push-and-sign.outputs.backend-digest }} \
            > /dev/null

          echo "vuln-signoff/v1 attestation verified on both image digests."

      - name: Configure AWS credentials (ECR attestation)
        # The mirror step in push-and-sign copies image layers only, not the
        # cosign .att OCI artifact. Attest the ECR images directly so Kyverno
        # can verify the attestation predicate when admitting pods that reference
        # the ECR URI rather than the GHCR URI.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login-attest
        uses: aws-actions/amazon-ecr-login@v2

      - name: Attest backend image in ECR
        # Use the actual ECR digest, not the GHCR digest. Docker re-serialises
        # the manifest when mirroring, producing a different SHA-256 digest in
        # ECR. cosign attest must reference the ECR digest so the .att artifact
        # is stored under sha256-<ecr-digest>.att — which is what Kyverno looks
        # for when verifying pods that reference the ECR image URI.
        env:
          PREDICATE_TYPE: https://oznetsecure.com.au/attestations/vuln-signoff/v1
        run: |
          ECR="${{ steps.ecr-login-attest.outputs.registry }}"
          ECR_DIGEST=$(aws ecr describe-images \
            --repository-name dsl-backend \
            --image-ids imageTag=${{ github.sha }} \
            --region "${AWS_REGION}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          echo "ECR backend digest: ${ECR_DIGEST}"
          cosign attest --yes \
            --type "${PREDICATE_TYPE}" \
            --predicate predicate.json \
            "${ECR}/dsl-backend@${ECR_DIGEST}"

      - name: Attest frontend image in ECR
        env:
          PREDICATE_TYPE: https://oznetsecure.com.au/attestations/vuln-signoff/v1
        run: |
          ECR="${{ steps.ecr-login-attest.outputs.registry }}"
          ECR_DIGEST=$(aws ecr describe-images \
            --repository-name dsl-frontend \
            --image-ids imageTag=${{ github.sha }} \
            --region "${AWS_REGION}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          echo "ECR frontend digest: ${ECR_DIGEST}"
          cosign attest --yes \
            --type "${PREDICATE_TYPE}" \
            --predicate predicate.json \
            "${ECR}/dsl-frontend@${ECR_DIGEST}"

      - name: Verify ECR attestations
        env:
          PREDICATE_TYPE: https://oznetsecure.com.au/attestations/vuln-signoff/v1
        run: |
          ECR="${{ steps.ecr-login-attest.outputs.registry }}"
          BACKEND_ECR_DIGEST=$(aws ecr describe-images \
            --repository-name dsl-backend \
            --image-ids imageTag=${{ github.sha }} \
            --region "${AWS_REGION}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          FRONTEND_ECR_DIGEST=$(aws ecr describe-images \
            --repository-name dsl-frontend \
            --image-ids imageTag=${{ github.sha }} \
            --region "${AWS_REGION}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          cosign verify-attestation \
            --type "${PREDICATE_TYPE}" \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${ECR}/dsl-backend@${BACKEND_ECR_DIGEST}" \
            > /dev/null
          cosign verify-attestation \
            --type "${PREDICATE_TYPE}" \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${ECR}/dsl-frontend@${FRONTEND_ECR_DIGEST}" \
            > /dev/null
          echo "vuln-signoff/v1 attestation verified on both ECR image digests."

# ══════════════════════════════════════════════════════════════════
# JOB 9 — Deploy to EKS
#
# Runs only after the attestation is written. If the cluster is
# destroyed, the cluster-check step emits a warning and skips the
# kubectl steps rather than failing the run. The job summary tells
# you exactly which deploy-lab.yml dispatch to run (with which
# image_tag) to provision from scratch.
# ══════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to EKS
    needs: [attest, push-and-sign]
    if: needs.attest.result == 'success' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: lab
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check cluster is reachable
        id: cluster_check
        run: |
          if aws eks update-kubeconfig --name "${CLUSTER_NAME}" --region "${AWS_REGION}" 2>/dev/null \
             && kubectl get nodes --request-timeout=15s >/dev/null 2>&1; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "::warning::EKS cluster ${CLUSTER_NAME} not found or not reachable — deploy skipped. Run deploy-lab.yml to provision."
          fi

      - name: Update backend image
        if: steps.cluster_check.outputs.reachable == 'true'
        env:
          ECR_REGISTRY: ${{ needs.push-and-sign.outputs.ecr-registry }}
        run: |
          if ! kubectl -n dsl get deployment backend --request-timeout=10s >/dev/null 2>&1; then
            echo "::warning::backend deployment not found in dsl namespace — workloads not provisioned yet. Run deploy-lab.yml first."
            exit 0
          fi
          kubectl -n dsl set image deployment/backend \
            backend="${ECR_REGISTRY}/dsl-backend:${{ github.sha }}"
          kubectl -n dsl rollout status deployment/backend --timeout=10m

      - name: Update frontend image
        if: steps.cluster_check.outputs.reachable == 'true'
        env:
          ECR_REGISTRY: ${{ needs.push-and-sign.outputs.ecr-registry }}
        run: |
          if ! kubectl -n dsl get deployment frontend --request-timeout=10s >/dev/null 2>&1; then
            echo "::warning::frontend deployment not found in dsl namespace — workloads not provisioned yet. Run deploy-lab.yml first."
            exit 0
          fi
          kubectl -n dsl set image deployment/frontend \
            frontend="${ECR_REGISTRY}/dsl-frontend:${{ github.sha }}"
          kubectl -n dsl rollout status deployment/frontend --timeout=10m

      - name: Smoke test backend health (via kubectl port-forward)
        if: steps.cluster_check.outputs.reachable == 'true'
        # ALB inbound-cidrs is locked to the operator's IP — runner can't reach
        # it externally. Port-forward directly to the backend service instead.
        run: |
          kubectl -n dsl port-forward svc/backend 18080:5001 &
          PF_PID=$!
          sleep 5
          if curl -fsS http://localhost:18080/health >/dev/null; then
            echo "Backend health check passed"
          else
            echo "::warning::Backend health check did not return 200 — check pod logs"
          fi
          kill $PF_PID 2>/dev/null || true

      - name: Summarise deploy
        if: always()
        run: |
          REACHABLE="${{ steps.cluster_check.outputs.reachable }}"
          ECR="${{ needs.push-and-sign.outputs.ecr-registry }}"
          {
            echo "## Deploy Summary"
            echo ""
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Cluster reachable: \`${REACHABLE}\`"
            if [ "${REACHABLE}" = "true" ]; then
              echo "- Backend:  \`${ECR}/dsl-backend:${{ github.sha }}\`"
              echo "- Frontend: \`${ECR}/dsl-frontend:${{ github.sha }}\`"
            else
              echo ""
              echo "> Cluster was down at deploy time."
              echo "> To provision and deploy, trigger **deploy-lab.yml** with:"
              echo "> - \`run_terraform: true\`"
              echo "> - \`image_tag: ${{ github.sha }}\`"
              echo "> - \`allowed_cidr: <your-ip>/32\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
