name: Deploy Lab

on:
  workflow_dispatch:
    inputs:
      allowed_cidr:
        description: "CIDR allowed to reach the ALB (example: 1.2.3.4/32)"
        required: true
        default: "112.213.131.214/32"
      image_tag:
        description: "Optional ECR image tag override for backend/frontend (blank = use checked-in manifests)"
        required: false
        default: ""
      run_terraform:
        description: "Run terraform apply for infra-lab"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-lab
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
  TF_VERSION: "1.10.5"
  CLUSTER_NAME: dsl-eks

jobs:
  deploy:
    name: Provision And Deploy
    runs-on: ubuntu-latest
    environment: lab
    outputs:
      alb_hostname: ${{ steps.alb.outputs.hostname }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pin image tags to deploy SHA
        # Use inputs.image_tag if provided (rollback / specific signed image),
        # otherwise default to github.sha (the commit that triggered this run).
        # Either way, the manifests are rewritten once here before any kubectl
        # apply — no second rollout needed.
        run: |
          SHA="${{ inputs.image_tag || github.sha }}"
          sed -i "s|dsl-backend:[a-f0-9]\{40\}|dsl-backend:${SHA}|g" k8s/backend/deployment.yaml
          sed -i "s|dsl-frontend:[a-f0-9]\{40\}|dsl-frontend:${SHA}|g" k8s/frontend/deployment.yaml
          echo "Image tags pinned to ${SHA}"
          grep -E 'image:.*dsl-(backend|frontend)' k8s/backend/deployment.yaml k8s/frontend/deployment.yaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Terraform apply
        if: ${{ inputs.run_terraform }}
        working-directory: terraform/infra-lab
        run: |
          terraform init -input=false
          terraform plan -out=lab.tfplan -input=false
          terraform apply -input=false lab.tfplan

      - name: Export Terraform outputs
        id: tf
        working-directory: terraform/infra-lab
        run: |
          echo "vpc_id=$(terraform output -raw vpc_id)" >> "$GITHUB_OUTPUT"
          echo "albc_role_arn=$(terraform output -raw alb_controller_role_arn)" >> "$GITHUB_OUTPUT"
          echo "backend_role_arn=$(terraform output -raw backend_role_arn)" >> "$GITHUB_OUTPUT"
          echo "kyverno_ecr_read_role_arn=$(terraform output -raw kyverno_ecr_read_role_arn)" >> "$GITHUB_OUTPUT"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name "${CLUSTER_NAME}" --region "${AWS_REGION}"
          kubectl get nodes

      - name: Ensure namespaces exist
        run: kubectl apply -f k8s/eso/namespace.yaml

      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update eks
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            -f helm/alb-controller/values.yaml \
            --set vpcId="${{ steps.tf.outputs.vpc_id }}" \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="${{ steps.tf.outputs.albc_role_arn }}"
          kubectl -n kube-system rollout status deployment/aws-load-balancer-controller --timeout=10m

      - name: Install External Secrets Operator
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update external-secrets
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            -f helm/external-secrets/values.yaml
          kubectl -n external-secrets rollout status deployment/external-secrets --timeout=10m
          kubectl -n external-secrets rollout status deployment/external-secrets-webhook --timeout=10m
          kubectl -n external-secrets rollout status deployment/external-secrets-cert-controller --timeout=10m

      - name: Wait for ESO webhook endpoint
        run: |
          for i in $(seq 1 60); do
            if kubectl -n external-secrets get endpoints external-secrets-webhook -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null | grep -q .; then
              echo "ESO webhook endpoint is ready"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Timed out waiting for external-secrets-webhook endpoint"
          exit 1

      - name: Apply ESO custom resources
        run: |
          kubectl apply -f k8s/eso/clustersecretstore.yaml
          kubectl apply -f k8s/eso/externalsecret-db-password.yaml
          kubectl apply -f k8s/eso/externalsecret-jwt-secret.yaml
          kubectl get clustersecretstore aws-secrets-manager
          kubectl -n dsl wait externalsecret/db-password --for=jsonpath='{.status.conditions[?(@.type=="Ready")].status}'=True --timeout=5m
          kubectl -n dsl wait externalsecret/jwt-secret --for=jsonpath='{.status.conditions[?(@.type=="Ready")].status}'=True --timeout=5m
          kubectl -n dsl get externalsecret,secret

      - name: Install Kyverno
        run: |
          helm repo add kyverno https://kyverno.github.io/kyverno/
          helm repo update kyverno
          # Always do a clean Kyverno install to avoid stale TLS certificates.
          #
          # MutatingWebhookConfigurations and ValidatingWebhookConfigurations are
          # cluster-scoped and survive namespace deletion. After a reinstall the new
          # pods generate fresh TLS certs, but the old webhook configs still carry the
          # prior caBundle — every webhook call then fails the TLS handshake with
          # "context deadline exceeded". The fix is to delete these cluster-scoped
          # resources explicitly before reinstalling so Kyverno creates them fresh.
          helm uninstall kyverno -n kyverno 2>/dev/null || true
          kubectl delete mutatingwebhookconfigurations \
            --selector="app.kubernetes.io/part-of=kyverno" --ignore-not-found=true 2>/dev/null || true
          kubectl delete validatingwebhookconfigurations \
            --selector="app.kubernetes.io/part-of=kyverno" --ignore-not-found=true 2>/dev/null || true
          kubectl delete namespace kyverno --ignore-not-found=true 2>/dev/null || true
          kubectl wait --for=delete namespace/kyverno --timeout=3m 2>/dev/null || true
          # Chart values (HA, webhook timeout, memory headroom, kubectl image
          # swap for the deprecated bitnami one) live in helm/kyverno/values.yaml
          # with full rationale comments. The SA's IRSA annotation is applied
          # via kubectl below — helm --set with a dotted annotation key
          # (eks.amazonaws.com/role-arn) is brittle across Helm/shell escape
          # combinations and silently produced an unannotated SA in CI.
          # See KYVERNO_ECR_VERIFY_FIX.md.
          helm install kyverno kyverno/kyverno \
            --namespace kyverno \
            --create-namespace \
            --version 3.2.6 \
            -f helm/kyverno/values.yaml \
            --wait --timeout=10m
          kubectl -n kyverno get pods

          # Annotate the admission-controller SA with the IRSA role ARN. The
          # EKS Pod Identity Webhook reads this annotation at pod admission
          # time and injects AWS_ROLE_ARN + AWS_WEB_IDENTITY_TOKEN_FILE plus
          # a projected service-account token. Without it, cosign in Kyverno
          # has no AWS credentials, the ECR /v2/ auth challenge loop hangs
          # waiting on IMDS, and the admission webhook times out.
          kubectl -n kyverno annotate sa kyverno-admission-controller \
            eks.amazonaws.com/role-arn=${{ steps.tf.outputs.kyverno_ecr_read_role_arn }} \
            --overwrite

          # Existing pods were admitted BEFORE the SA was annotated, so the
          # webhook didn't inject IRSA env on them. Rolling restart forces
          # re-admission so the new pods come up with the env wired in.
          kubectl -n kyverno rollout restart deploy/kyverno-admission-controller
          kubectl -n kyverno rollout status  deploy/kyverno-admission-controller --timeout=3m

          # Now verify. We read env from the pod spec via the API server
          # (the Kyverno container is distroless — no shell to exec into).
          POD_ENV=$(kubectl -n kyverno get pod \
            -l app.kubernetes.io/component=admission-controller \
            -o jsonpath='{range .items[0].spec.containers[?(@.name=="kyverno")].env[*]}{.name}{"\n"}{end}')
          echo "Kyverno admission-controller env keys:"
          echo "$POD_ENV"
          MISSING=""
          for VAR in AWS_ROLE_ARN AWS_WEB_IDENTITY_TOKEN_FILE; do
            echo "$POD_ENV" | grep -qx "$VAR" || MISSING="$MISSING $VAR"
          done
          if [ -n "$MISSING" ]; then
            echo "::error::IRSA env vars missing on Kyverno pod:$MISSING - admission webhook will time out on cosign verify. See KYVERNO_ECR_VERIFY_FIX.md."
            echo "::error::Current SA annotations:"
            kubectl -n kyverno get sa kyverno-admission-controller -o jsonpath='{.metadata.annotations}'
            exit 1
          fi
          echo "IRSA env vars present on admission-controller pod."

      - name: Wait for Kyverno webhook endpoint
        run: |
          # Wait for three conditions before proceeding:
          # 1. kyverno-svc endpoint has a pod IP (admission controller is Running)
          # 2. TLS secret exists (cert manager has generated the webhook certificate)
          # 3. MutatingWebhookConfiguration exists (webhook controller has registered it)
          # Kyverno creates (2) and (3) asynchronously after pods become Ready.
          # Checking only (1) causes "TLS handshake error: secret not found" because
          # the pod is Running but cert generation hasn't completed yet.
          echo "Waiting for Kyverno admission webhook to be fully ready..."
          for i in $(seq 1 60); do
            ENDPOINT=$(kubectl -n kyverno get endpoints kyverno-svc \
              -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || true)
            TLS_SECRET=$(kubectl -n kyverno get secret \
              kyverno-svc.kyverno.svc.kyverno-tls-pair 2>/dev/null && echo "ok" || true)
            WEBHOOK=$(kubectl get mutatingwebhookconfiguration \
              kyverno-resource-mutating-webhook-cfg 2>/dev/null && echo "ok" || true)
            if [ -n "$ENDPOINT" ] && [ -n "$TLS_SECRET" ] && [ -n "$WEBHOOK" ]; then
              echo "Kyverno fully ready (endpoint=$ENDPOINT, TLS secret=ok, webhook=ok)"
              break
            fi
            echo "Attempt $i/60 — endpoint=${ENDPOINT:-missing}, tls=${TLS_SECRET:-missing}, webhook=${WEBHOOK:-missing} — waiting 10s..."
            sleep 10
            if [ "$i" -eq 60 ]; then
              echo "::error::Timed out waiting for Kyverno to be fully ready"
              exit 1
            fi
          done

      - name: Apply Kyverno admission policies
        run: |
          kubectl apply -f k8s/kyverno/clusterpolicy-image-verify.yaml
          kubectl get clusterpolicy dsl-verify-images

      - name: Deploy database
        run: |
          kubectl apply -f k8s/db/configmap.yaml
          kubectl apply -f k8s/db/configmap-init.yaml
          kubectl apply -f k8s/db/pvc.yaml
          kubectl apply -f k8s/db/service.yaml
          kubectl apply -f k8s/db/deployment.yaml
          kubectl -n dsl rollout status deployment/db --timeout=10m

      - name: Deploy backend
        run: |
          kubectl apply -f k8s/backend/serviceaccount.yaml
          kubectl apply -f k8s/backend/configmap.yaml
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/backend/deployment.yaml
          kubectl -n dsl rollout status deployment/backend --timeout=10m

      - name: Deploy frontend
        run: |
          kubectl apply -f k8s/frontend/service.yaml
          kubectl apply -f k8s/frontend/deployment.yaml
          kubectl -n dsl rollout status deployment/frontend --timeout=10m

      - name: Apply ingress
        run: |
          kubectl apply -f k8s/ingress.yaml
          kubectl -n dsl annotate ingress dsl-ingress \
            alb.ingress.kubernetes.io/inbound-cidrs="${{ inputs.allowed_cidr }}" \
            --overwrite

      - name: Wait for ALB hostname
        id: alb
        run: |
          for i in $(seq 1 90); do
            HOSTNAME="$(kubectl -n dsl get ingress dsl-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            if [ -n "${HOSTNAME}" ]; then
              echo "hostname=${HOSTNAME}" >> "$GITHUB_OUTPUT"
              echo "ALB hostname: ${HOSTNAME}"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for ALB hostname"
          exit 1

      - name: Smoke test backend health (via kubectl port-forward)
        # The ALB inbound-cidrs is locked to the operator's IP — the GitHub
        # Actions runner can never reach it externally. Instead, port-forward
        # directly to the backend pod and hit /health from inside the runner.
        run: |
          kubectl -n dsl port-forward svc/backend 18080:5001 &
          PF_PID=$!
          sleep 5
          if curl -fsS http://localhost:18080/health >/dev/null; then
            echo "Backend health check passed"
          else
            echo "::warning::Backend health check did not return 200 — check pod logs"
          fi
          kill $PF_PID 2>/dev/null || true

      - name: Summarise deployment
        run: |
          {
            echo "## Lab Deploy Summary"
            echo ""
            echo "- Cluster: \`${CLUSTER_NAME}\`"
            echo "- Region: \`${AWS_REGION}\`"
            echo "- Allowed CIDR: \`${{ inputs.allowed_cidr }}\`"
            echo "- ALB hostname: \`${{ steps.alb.outputs.hostname }}\`"
            echo "- Image SHA: \`${{ inputs.image_tag || github.sha }}\`"
            echo ""
            echo "### Next manual step"
            echo "Update the GoDaddy CNAME for \`lab.oznetsecure.com.au\` to:"
            echo ""
            echo "\`${{ steps.alb.outputs.hostname }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
