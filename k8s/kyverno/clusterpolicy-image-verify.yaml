# =============================================================================
# ClusterPolicy — dsl-verify-images
#
# PURPOSE
#   Enforces supply-chain integrity for all Pods in the dsl namespace.
#   Two checks run at admission time:
#     1. Cosign signature — the image must have been signed by the
#        security-pipeline GitHub Actions workflow using keyless signing
#        (Sigstore OIDC + Rekor transparency log).
#     2. vuln-signoff/v1 attestation — the image must carry the structured
#        gate-outcome attestation produced by the pipeline's `attest` job,
#        and every gate (SAST, SCA, Trivy, DAST) must have status in
#        [clean, accepted, skipped]. A Pod referencing an image that never
#        went through the pipeline, or whose gates were not resolved, is
#        rejected before it is scheduled.
#
# SCOPE
#   imageReferences patterns limit enforcement to dsl-backend and dsl-frontend
#   images from GHCR and ECR. The postgres image used by the db Pod does not
#   match either pattern and is not subject to this policy.
#
# MODE
#   validationFailureAction: Enforce — non-compliant Pods are rejected, not
#   just logged. To switch to audit-only (log violations, allow all Pods),
#   change this to Audit. Useful when first rolling out the policy against
#   an existing workload.
#
# KEYLESS SIGNING
#   The pipeline signs images without a long-lived private key. Instead,
#   cosign uses the GitHub Actions OIDC token to obtain a short-lived
#   certificate from Sigstore's Fulcio CA, records the signing event in
#   the Rekor append-only transparency log, and discards the ephemeral key.
#   Verification requires only the Rekor URL and the expected certificate
#   identity (the workflow URL) — no key material needs to be stored in the
#   cluster. This is the SLSA keyless signing model.
# =============================================================================

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: dsl-verify-images
  annotations:
    policies.kyverno.io/title: "Verify cosign signature and vuln-signoff attestation"
    policies.kyverno.io/category: "Supply Chain Security"
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Rejects any Pod in the dsl namespace whose images have not been signed
      by the security-pipeline workflow or whose vuln-signoff/v1 attestation
      is missing or has unresolved gate outcomes.
spec:
  # Temporarily Audit while ECR signing/attestation is wired up in the pipeline.
  # Switch back to Enforce once a new security-pipeline run has pushed
  # .sig/.att OCI artifacts into ECR for the current image SHA.
  validationFailureAction: Enforce
  background: false   # only evaluate at admission time, not on existing resources
  rules:

  # ---------------------------------------------------------------------------
  # Rule 1 — Registry allowlist
  #
  # Rejects any Pod in the dsl namespace whose containers reference an image
  # from an unapproved registry. This is a separate concern from signature
  # verification: verifyImages only evaluates images that match its
  # imageReferences patterns, so an image from Docker Hub or any other
  # registry would pass straight through without being checked at all.
  #
  # This validate rule closes that gap by explicitly denying any image that
  # does not originate from one of the three approved sources:
  #   - ECR  (dsl-backend / dsl-frontend)
  #   - GHCR (dsl-backend / dsl-frontend)
  #   - Docker Hub postgres (db pod only)
  #
  # Together rules 1 and 2 form a complete supply-chain control:
  #   Rule 1 → image must come from an approved registry
  #   Rule 2 → image must be signed and attested by the pipeline
  # ---------------------------------------------------------------------------
  - name: restrict-image-registries
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - dsl
    validate:
      message: "Image is not from an approved registry. Allowed: ECR dsl-*, GHCR dsl-*, postgres:*."
      foreach:
      - list: "request.object.spec.containers"
        deny:
          conditions:
            all:
            - key: "{{ element.image }}"
              operator: NotEquals
              value: "510151297987.dkr.ecr.ap-southeast-2.amazonaws.com/dsl-*"
            - key: "{{ element.image }}"
              operator: NotEquals
              value: "ghcr.io/igorgroz/dsl-*"
            - key: "{{ element.image }}"
              operator: NotEquals
              value: "postgres:*"

  # ---------------------------------------------------------------------------
  # Rule 2 — Signature + attestation verification
  # ---------------------------------------------------------------------------
  - name: verify-app-image-signature-and-attestation
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - dsl

    verifyImages:
    - imageReferences:
      # Only enforce on the app images. postgres (db Pod) does not match and
      # is not subject to this policy. Add registries here as the app grows.
      - "ghcr.io/igorgroz/dsl-*"
      - "510151297987.dkr.ecr.ap-southeast-2.amazonaws.com/dsl-*"

      # Don't rewrite image references to digests — the pipeline already pins
      # by SHA tag. Setting both to false keeps manifests readable.
      mutateDigest: false
      verifyDigest: false

      # --- Signature verification ---
      # The certificate identity regexp matches any workflow file in the repo.
      # The issuer pins to GitHub Actions OIDC. Rekor URL is the public
      # Sigstore transparency log.
      attestors:
      - count: 1
        entries:
        - keyless:
            subject: "https://github.com/igorgroz/devseclab/.github/workflows/*"
            issuer: "https://token.actions.githubusercontent.com"
            rekor:
              url: https://rekor.sigstore.dev

      # --- Attestation verification ---
      # Verifies the vuln-signoff/v1 predicate exists and gate statuses are
      # in the allowed set. Kyverno exposes the decoded predicate CONTENT at
      # the JMESPath root, so reference fields directly (gates.sast.status) —
      # NOT predicate.gates.sast.status. The predicate. prefix fails with
      # 'Unknown key "predicate"'.
      attestations:
      - type: "https://oznetsecure.com.au/attestations/vuln-signoff/v1"
        attestors:
        - count: 1
          entries:
          - keyless:
              subject: "https://github.com/igorgroz/devseclab/.github/workflows/*"
              issuer: "https://token.actions.githubusercontent.com"
              rekor:
                url: https://rekor.sigstore.dev

        conditions:
        - all:
          # Note: message fields do not have access to the predicate variable
          # context in Kyverno 3.x — only the key field does. Static strings used.
          - key: "{{ gates.sast.status }}"
            operator: AnyIn
            value: ["clean", "accepted", "skipped"]
            message: "SAST gate status is not in [clean, accepted, skipped]"

          - key: "{{ gates.sca.status }}"
            operator: AnyIn
            value: ["clean", "accepted", "skipped"]
            message: "SCA gate status is not in [clean, accepted, skipped]"

          - key: "{{ gates.trivy.status }}"
            operator: AnyIn
            value: ["clean", "accepted", "skipped"]
            message: "Trivy gate status is not in [clean, accepted, skipped]"

          - key: "{{ gates.dast.status }}"
            operator: AnyIn
            value: ["clean", "accepted", "skipped"]
            message: "DAST gate status is not in [clean, accepted, skipped]"
