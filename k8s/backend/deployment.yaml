# =============================================================================
# Backend Deployment — EKS edition
#
# Changes from the minikube version:
#   - image: ECR-hosted, pinned to git SHA 5af67ab4... (signed + attested via cosign in ECR)
#   - imagePullPolicy: IfNotPresent (the default; explicit Never was for minikube)
#   - serviceAccountName: dsl-backend-sa (provides IRSA identity for AWS calls)
#   - envFrom: split into ConfigMap (non-sensitive) + explicit valueFrom for
#     ESO-managed Secrets (DB_PASSWORD, JWT_SECRET)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dsl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: dsl-backend-sa
      containers:
        - name: backend
          image: 510151297987.dkr.ecr.ap-southeast-2.amazonaws.com/dsl-backend:5af67ab43c9060b846cb71d16749fc427b63bb55
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001

          # Non-sensitive configuration from ConfigMap
          envFrom:
            - configMapRef:
                name: backend-config

          # Sensitive values from ESO-managed K8s Secrets (synced from AWS
          # Secrets Manager). Each value is mapped explicitly so a misnamed
          # key surfaces as a pod-startup error, not a silent fallback.
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-password   # synced by ESO from dsl/backend/db-password
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret    # synced by ESO from dsl/backend/jwt-secret
                  key: secret

          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
